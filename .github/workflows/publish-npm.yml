name: Release and Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Fetch git tags
        run: git fetch --tags --force

      - name: Determine SemVer bump
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --sort=-v:refname | head -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            range="HEAD"
          else
            range="${latest_tag}..HEAD"
          fi

          commits="$(git log --format=%B "${range}")"
          bump="patch"

          if printf '%s\n' "${commits}" | grep -Eq 'BREAKING CHANGE:|^[a-z]+(\([^)]+\))?!:'; then
            bump="major"
          elif printf '%s\n' "${commits}" | grep -Eq '^feat(\([^)]+\))?:'; then
            bump="minor"
          fi

          echo "bump=${bump}" >> "${GITHUB_OUTPUT}"

      - name: Bump package version
        run: npm version "${{ steps.bump.outputs.bump }}" --no-git-tag-version

      - name: Build package
        run: npm run build

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          version="$(node -p "require('./package.json').version")"

          git add -A

          if git diff --cached --quiet; then
            echo "No release changes detected."
            exit 0
          fi

          git commit -m "chore(release): v${version} [skip ci]"
          git tag "v${version}"
          git push origin HEAD:main "v${version}"

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
